sentence=A lightweight, non-blocking input handler for buttons and selectors with event-based callbacks.
paragraph=ButtonPoll is an efficient input engine using 32-bit masking to handle up to 32 pins. It supports momentary buttons, selectors (toggle), and repeat patterns with a clean event contract system (Press, Release, Selector ON/OFF).
